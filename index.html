<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
      50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.6), 0 0 60px rgba(34, 197, 94, 0.4); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-1deg); }
      75% { transform: translateX(5px) rotate(1deg); }
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    @keyframes celebration-bounce {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.2) rotate(-10deg); }
      50% { transform: scale(1.1) rotate(10deg); }
      75% { transform: scale(1.15) rotate(-5deg); }
    }
    
    @keyframes text-pop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
    
    @keyframes meme-entry {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    
    @keyframes typing-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    .float-animation { animation: float 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .shake-animation { animation: shake 0.5s ease-in-out; }
    .celebration-bounce { animation: celebration-bounce 0.6s ease-in-out; }
    .text-pop { animation: text-pop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    .meme-entry { animation: meme-entry 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    
    .gradient-bg {
      background: linear-gradient(-45deg, #0f0f23, #1a1a3e, #2d1b4e, #1e3a5f);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: confetti-fall linear forwards;
      pointer-events: none;
      z-index: 1000;
    }
    
    .sparkle {
      position: absolute;
      font-size: 24px;
      animation: sparkle 1.5s ease-in-out infinite;
      pointer-events: none;
    }
    
    .strength-bar {
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    
    .meme-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3), 0 0 20px rgba(139, 92, 246, 0.2);
    }
    
    .typing-cursor::after {
      content: '|';
      animation: typing-cursor 1s infinite;
      margin-left: 2px;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-container" class="h-full w-full gradient-bg overflow-auto">
   <!-- Confetti Container -->
   <div id="confetti-container"></div><!-- Sparkles Container -->
   <div id="sparkles-container" class="fixed inset-0 pointer-events-none overflow-hidden"></div>
   <div class="min-h-full flex flex-col items-center justify-center p-6 relative">
    <!-- Floating Decorative Elements -->
    <div class="absolute top-10 left-10 text-6xl float-animation opacity-30">
     🔐
    </div>
    <div class="absolute top-20 right-16 text-5xl float-animation opacity-30" style="animation-delay: 0.5s;">
     🛡️
    </div>
    <div class="absolute bottom-20 left-20 text-4xl float-animation opacity-30" style="animation-delay: 1s;">
     ✨
    </div>
    <div class="absolute bottom-32 right-10 text-5xl float-animation opacity-30" style="animation-delay: 1.5s;">
     🔑
    </div><!-- Main Card -->
    <div class="w-full max-w-lg relative">
     <!-- Title Section -->
     <div class="text-center mb-8">
      <h1 id="main-title" class="text-4xl md:text-5xl font-black text-white mb-3 tracking-tight">Password Power 💪</h1>
      <p id="subtitle" class="text-purple-300 text-lg">Check if your password is strong enough!</p>
     </div><!-- Password Input Card -->
     <div class="meme-card rounded-3xl p-8 mb-6">
      <label class="block text-purple-200 text-sm font-semibold mb-3 uppercase tracking-wider"> Enter Your Password </label>
      <div class="relative">
       <input type="password" id="password-input" class="w-full px-6 py-4 bg-white/10 border-2 border-purple-400/30 rounded-2xl text-white text-lg placeholder-purple-300/50 focus:outline-none input-glow transition-all duration-300" placeholder="Type your secret password..." autocomplete="new-password"> <button id="toggle-visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-2xl hover:scale-110 transition-transform"> 👁️ </button>
      </div><!-- Strength Bar -->
      <div class="mt-6">
       <div class="flex justify-between mb-2">
        <span class="text-purple-200 text-sm font-medium">Strength</span> <span id="strength-label" class="text-sm font-bold text-gray-400">Enter password</span>
       </div>
       <div class="h-3 bg-white/10 rounded-full overflow-hidden">
        <div id="strength-bar" class="strength-bar h-full w-0 rounded-full bg-gray-500"></div>
       </div>
      </div><!-- Requirements Checklist -->
      <div class="mt-6 space-y-2" id="requirements-list">
       <div class="requirement flex items-center gap-3 text-sm" data-req="length">
        <span class="req-icon text-xl">⚪</span> <span class="text-purple-200">At least 8 characters</span>
       </div>
       <div class="requirement flex items-center gap-3 text-sm" data-req="uppercase">
        <span class="req-icon text-xl">⚪</span> <span class="text-purple-200">Uppercase letter (A-Z)</span>
       </div>
       <div class="requirement flex items-center gap-3 text-sm" data-req="lowercase">
        <span class="req-icon text-xl">⚪</span> <span class="text-purple-200">Lowercase letter (a-z)</span>
       </div>
       <div class="requirement flex items-center gap-3 text-sm" data-req="number">
        <span class="req-icon text-xl">⚪</span> <span class="text-purple-200">Number (0-9)</span>
       </div>
       <div class="requirement flex items-center gap-3 text-sm" data-req="special">
        <span class="req-icon text-xl">⚪</span> <span class="text-purple-200">Special character (!@#$%^&amp;*)</span>
       </div>
      </div>
     </div><!-- Meme Reaction Section -->
     <div id="meme-section" class="meme-card rounded-3xl p-6 text-center hidden">
      <div id="meme-content" class="space-y-4">
       <!-- Meme content will be inserted here -->
      </div>
     </div><!-- Generate Strong Password Button --> <button id="generate-btn" class="w-full mt-4 py-4 px-6 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold text-lg rounded-2xl transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-purple-500/30"> 🎲 Generate Strong Password </button>
    </div><!-- Footer -->
    <div class="mt-8 text-center space-y-2">
     <p class="text-purple-400/60 text-sm">Made with 💜 for secure passwords</p>
     <p class="text-purple-400/70 text-sm">Created by <span class="font-bold text-purple-300">Dhanji</span> <a href="https://github.com/dhanji-singh" target="_blank" rel="noopener noreferrer" class="text-purple-400 hover:text-purple-300 underline transition-colors"> 🔗 GitHub Profile </a></p>
    </div>
   </div>
  </div>
  <script>
    // Configuration
    const defaultConfig = {
      primary_color: '#8b5cf6',
      secondary_color: '#1a1a3e',
      text_color: '#ffffff',
      accent_color: '#ec4899',
      surface_color: '#2d1b4e',
      font_family: 'Poppins',
      font_size: 16,
      main_title: 'Password Power 💪',
      subtitle_text: 'Check if your password is strong enough!'
    };

    let config = { ...defaultConfig };
    let previousStrength = 0;
    let hasShownCelebration = false;

    // Meme reactions for different password strengths
    const memeReactions = {
      empty: {
        emoji: '😴',
        title: 'Waiting...',
        subtitle: 'Type something, boss!',
        bgClass: 'from-gray-600 to-gray-700'
      },
      veryWeak: {
        emoji: '😱',
        title: 'Bohot Weak Hai Bhai!',
        subtitle: '"Yeh kya kar diya tune!" - Every Hacker',
        bgClass: 'from-red-600 to-red-700',
        memeText: '🚨 ALERT: Even your grandma can crack this! 🚨'
      },
      weak: {
        emoji: '😅',
        title: 'Thoda Effort Daal!',
        subtitle: '"Kitna aasan hai, beta!" - Hackers',
        bgClass: 'from-orange-500 to-red-500',
        memeText: '📱 Your password in 2 seconds flat!'
      },
      medium: {
        emoji: '🤔',
        title: 'Hmm... Getting There!',
        subtitle: '"Theek hai, but better kar sakte ho"',
        bgClass: 'from-yellow-500 to-orange-500',
        memeText: '⚡ Add some spice! Numbers? Symbols?'
      },
      strong: {
        emoji: '💪',
        title: 'Badhiya Hai Boss!',
        subtitle: '"Ab hum baat karte hain!" - You to Hackers',
        bgClass: 'from-green-500 to-emerald-500',
        memeText: '🔥 Hackers are sweating now!'
      },
      veryStrong: {
        emoji: '🏆',
        title: 'LEGEND! Bahut Hard! 🎉',
        subtitle: '"Ye banda dangerous hai!" - All Hackers',
        bgClass: 'from-emerald-400 to-cyan-400',
        memeText: '👑 Even NASA can\'t crack this! King/Queen! 👑',
        celebration: true
      }
    };

    // DOM Elements
    const passwordInput = document.getElementById('password-input');
    const strengthBar = document.getElementById('strength-bar');
    const strengthLabel = document.getElementById('strength-label');
    const memeSection = document.getElementById('meme-section');
    const memeContent = document.getElementById('meme-content');
    const toggleBtn = document.getElementById('toggle-visibility');
    const generateBtn = document.getElementById('generate-btn');
    const confettiContainer = document.getElementById('confetti-container');
    const sparklesContainer = document.getElementById('sparkles-container');

    // Check password strength
    function checkPasswordStrength(password) {
      const checks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
      };

      // Update requirement icons with animation
      Object.keys(checks).forEach(req => {
        const reqElement = document.querySelector(`[data-req="${req}"]`);
        if (reqElement) {
          const icon = reqElement.querySelector('.req-icon');
          const wasChecked = icon.textContent === '✅';
          const isChecked = checks[req];
          
          if (isChecked && !wasChecked) {
            icon.textContent = '✅';
            reqElement.classList.add('text-pop');
            setTimeout(() => reqElement.classList.remove('text-pop'), 500);
          } else if (!isChecked && wasChecked) {
            icon.textContent = '⚪';
          } else if (!isChecked) {
            icon.textContent = '⚪';
          }
        }
      });

      const score = Object.values(checks).filter(Boolean).length;
      
      // Bonus for length
      let bonusScore = 0;
      if (password.length >= 12) bonusScore += 0.5;
      if (password.length >= 16) bonusScore += 0.5;

      return Math.min(5, score + bonusScore);
    }

    // Get strength level
    function getStrengthLevel(score, password) {
      if (!password) return 'empty';
      if (score < 1.5) return 'veryWeak';
      if (score < 2.5) return 'weak';
      if (score < 3.5) return 'medium';
      if (score < 4.5) return 'strong';
      return 'veryStrong';
    }

    // Update UI based on strength
    function updateStrengthUI(password) {
      const score = checkPasswordStrength(password);
      const level = getStrengthLevel(score, password);
      const reaction = memeReactions[level];

      // Update strength bar
      const percentage = password ? (score / 5) * 100 : 0;
      strengthBar.style.width = `${percentage}%`;

      // Update bar color
      const colors = {
        empty: 'bg-gray-500',
        veryWeak: 'bg-red-500',
        weak: 'bg-orange-500',
        medium: 'bg-yellow-500',
        strong: 'bg-green-500',
        veryStrong: 'bg-gradient-to-r from-emerald-400 to-cyan-400'
      };

      strengthBar.className = `strength-bar h-full rounded-full ${colors[level]}`;

      // Update label
      const labels = {
        empty: 'Enter password',
        veryWeak: '💀 Very Weak',
        weak: '😰 Weak',
        medium: '🤷 Medium',
        strong: '💪 Strong',
        veryStrong: '🏆 UNBREAKABLE!'
      };

      const labelColors = {
        empty: 'text-gray-400',
        veryWeak: 'text-red-400',
        weak: 'text-orange-400',
        medium: 'text-yellow-400',
        strong: 'text-green-400',
        veryStrong: 'text-cyan-400'
      };

      strengthLabel.textContent = labels[level];
      strengthLabel.className = `text-sm font-bold ${labelColors[level]}`;

      // Show meme section
      if (password) {
        memeSection.classList.remove('hidden');
        updateMemeSection(reaction, level);
        
        // Trigger celebration for very strong password
        if (level === 'veryStrong' && !hasShownCelebration) {
          hasShownCelebration = true;
          triggerCelebration();
        } else if (level !== 'veryStrong') {
          hasShownCelebration = false;
        }
      } else {
        memeSection.classList.add('hidden');
        hasShownCelebration = false;
      }

      // Add glow effect for strong passwords
      if (level === 'veryStrong') {
        passwordInput.classList.add('pulse-glow');
      } else {
        passwordInput.classList.remove('pulse-glow');
      }

      previousStrength = score;
    }

    // Update meme section content
    function updateMemeSection(reaction, level) {
      memeContent.innerHTML = `
        <div class="meme-entry">
          <div class="text-7xl mb-4 celebration-bounce">${reaction.emoji}</div>
          <h3 class="text-2xl font-black text-white mb-2">${reaction.title}</h3>
          <p class="text-purple-200 text-lg mb-3">${reaction.subtitle}</p>
          ${reaction.memeText ? `
            <div class="inline-block px-4 py-2 bg-white/10 rounded-xl text-white font-medium">
              ${reaction.memeText}
            </div>
          ` : ''}
        </div>
        ${level === 'veryStrong' ? `
          <div class="mt-4 flex justify-center gap-2 text-3xl">
            <span class="float-animation" style="animation-delay: 0s;">🎉</span>
            <span class="float-animation" style="animation-delay: 0.2s;">🎊</span>
            <span class="float-animation" style="animation-delay: 0.4s;">🥳</span>
            <span class="float-animation" style="animation-delay: 0.6s;">🎆</span>
            <span class="float-animation" style="animation-delay: 0.8s;">🎇</span>
          </div>
        ` : ''}
      `;
    }

    // Trigger celebration effects
    function triggerCelebration() {
      // Create confetti
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];
      
      for (let i = 0; i < 100; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti-piece';
          confetti.style.left = `${Math.random() * 100}%`;
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
          confetti.style.animationDelay = `${Math.random() * 0.5}s`;
          
          // Random shapes
          const shapes = ['50%', '0%', '30%'];
          confetti.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
          confetti.style.width = `${8 + Math.random() * 8}px`;
          confetti.style.height = `${8 + Math.random() * 8}px`;
          
          confettiContainer.appendChild(confetti);
          
          // Remove after animation
          setTimeout(() => confetti.remove(), 4000);
        }, i * 30);
      }

      // Create sparkles around the input
      createSparkles();

      // Shake animation on meme section
      memeSection.classList.add('shake-animation');
      setTimeout(() => memeSection.classList.remove('shake-animation'), 500);
    }

    // Create sparkles
    function createSparkles() {
      const sparkleEmojis = ['✨', '⭐', '💫', '🌟', '⚡'];
      
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const sparkle = document.createElement('span');
          sparkle.className = 'sparkle';
          sparkle.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
          sparkle.style.left = `${10 + Math.random() * 80}%`;
          sparkle.style.top = `${10 + Math.random() * 80}%`;
          sparkle.style.animationDelay = `${Math.random() * 1}s`;
          
          sparklesContainer.appendChild(sparkle);
          
          setTimeout(() => sparkle.remove(), 3000);
        }, i * 100);
      }
    }

    // Generate strong password
    function generateStrongPassword() {
      const lowercase = 'abcdefghijklmnopqrstuvwxyz';
      const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const numbers = '0123456789';
      const special = '!@#$%^&*()_+-=';
      
      let password = '';
      
      // Ensure at least one of each type
      password += lowercase[Math.floor(Math.random() * lowercase.length)];
      password += uppercase[Math.floor(Math.random() * uppercase.length)];
      password += numbers[Math.floor(Math.random() * numbers.length)];
      password += special[Math.floor(Math.random() * special.length)];
      
      // Fill remaining length
      const allChars = lowercase + uppercase + numbers + special;
      for (let i = 0; i < 12; i++) {
        password += allChars[Math.floor(Math.random() * allChars.length)];
      }
      
      // Shuffle password
      password = password.split('').sort(() => Math.random() - 0.5).join('');
      
      // Animate the input
      passwordInput.type = 'text';
      toggleBtn.textContent = '🙈';
      passwordInput.value = '';
      passwordInput.classList.add('shake-animation');
      
      // Type out password
      let index = 0;
      const typeInterval = setInterval(() => {
        if (index < password.length) {
          passwordInput.value += password[index];
          updateStrengthUI(passwordInput.value);
          index++;
        } else {
          clearInterval(typeInterval);
          passwordInput.classList.remove('shake-animation');
        }
      }, 50);
    }

    // Toggle password visibility
    toggleBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = '👁️';
      }
    });

    // Password input listener
    passwordInput.addEventListener('input', (e) => {
      updateStrengthUI(e.target.value);
    });

    // Generate button listener
    generateBtn.addEventListener('click', generateStrongPassword);

    // Render function for config changes
    async function onConfigChange(cfg) {
      const title = document.getElementById('main-title');
      const subtitle = document.getElementById('subtitle');
      
      if (title) title.textContent = cfg.main_title || defaultConfig.main_title;
      if (subtitle) subtitle.textContent = cfg.subtitle_text || defaultConfig.subtitle_text;
      
      // Apply font
      const customFont = cfg.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${customFont}, sans-serif`;
      
      // Apply font size
      const baseSize = cfg.font_size || defaultConfig.font_size;
      if (title) title.style.fontSize = `${baseSize * 2.5}px`;
      if (subtitle) subtitle.style.fontSize = `${baseSize * 1.1}px`;
    }

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.secondary_color || defaultConfig.secondary_color,
              set: (v) => { cfg.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }
            },
            {
              get: () => cfg.surface_color || defaultConfig.surface_color,
              set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            },
            {
              get: () => cfg.primary_color || defaultConfig.primary_color,
              set: (v) => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
            },
            {
              get: () => cfg.accent_color || defaultConfig.accent_color,
              set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => cfg.font_family || defaultConfig.font_family,
            set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => cfg.font_size || defaultConfig.font_size,
            set: (v) => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['main_title', cfg.main_title || defaultConfig.main_title],
          ['subtitle_text', cfg.subtitle_text || defaultConfig.subtitle_text]
        ])
      });
      config = window.elementSdk.config;
    }

    // Initial render
