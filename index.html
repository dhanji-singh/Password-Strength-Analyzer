<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .main-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .analyzer-container {
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Code Viewer Styles */
        .code-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .code-header h2 {
            font-size: 20px;
            color: #333;
            margin: 0;
        }

        .file-selector {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-selector:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .code-viewer {
            background: #282c34;
            border-radius: 8px;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .code-content {
            overflow-y: auto;
            flex: 1;
            padding: 20px;
        }

        .code-content code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .hljs {
            background: transparent !important;
            padding: 0 !important;
        }

        .copy-button {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .copy-button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .copy-button.copied {
            background: #27ae60;
        }

        /* Analyzer Section Styles */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .show-password {
            margin-top: 8px;
            display: flex;
            align-items: center;
        }

        .show-password input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .show-password label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
        }

        .strength-meter {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 10px;
        }

        .strength-bar.weak {
            width: 33%;
            background-color: #e74c3c;
        }

        .strength-bar.moderate {
            width: 66%;
            background-color: #f39c12;
        }

        .strength-bar.strong {
            width: 100%;
            background-color: #27ae60;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.weak {
            background-color: #fadbd8;
            color: #c0392b;
            border: 2px solid #e74c3c;
        }

        .result.moderate {
            background-color: #fdebd0;
            color: #d68910;
            border: 2px solid #f39c12;
        }

        .result.strong {
            background-color: #d5f4e6;
            color: #186a3b;
            border: 2px solid #27ae60;
        }

        .criteria {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #eee;
        }

        .criteria h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .criteria-list {
            display: grid;
            gap: 10px;
        }

        .criteria-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666;
        }

        .criteria-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .criteria-icon.met {
            background-color: #d5f4e6;
            color: #27ae60;
        }

        .criteria-icon.unmet {
            background-color: #fadbd8;
            color: #e74c3c;
        }

        .feedback {
            margin-top: 20px;
            padding: 12px;
            background-color: #ecf0f1;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            font-size: 14px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-weight: 600;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <!-- Left: Analyzer -->
        <div class="container analyzer-container">
            <h1>🔐 Password Strength Analyzer</h1>
            <p class="subtitle">Check your password strength in real-time</p>

            <div class="form-group">
                <label for="password">Enter Password:</label>
                <input type="password" id="password" placeholder="Type your password here">
                <div class="show-password">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword">Show password</label>
                </div>
            </div>

            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>

            <div class="result" id="result"></div>

            <div class="feedback" id="feedback"></div>

            <div class="stats" id="stats"></div>

            <div class="criteria">
                <h3>Password Criteria:</h3>
                <div class="criteria-list" id="criteriaList"></div>
            </div>

            <button onclick="clearPassword()">Clear</button>
        </div>

        <!-- Right: Code Viewer -->
        <div class="container code-container">
            <div class="code-header">
                <h2>📄 Source Code</h2>
                <select id="fileSelector" class="file-selector" onchange="loadCodeFile(this.value)">
                    <option value="code.c">code.c (CLI)</option>
                    <option value="gui_tui.c">gui_tui.c (TUI)</option>
                </select>
                <button class="copy-button" id="copyButton" onclick="copyCodeToClipboard()">Copy Code</button>
            </div>
            <div class="code-viewer">
                <div class="code-content" id="codeContent">
                    <pre><code id="codeBlock" class="language-c"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const codeBlock = document.getElementById('codeBlock');
        const codeContent = document.getElementById('codeContent');
        const copyButton = document.getElementById('copyButton');

        // Code files
        const codeFiles = {
            'code.c': `#include <stdio.h>
#include <string.h>
#include <ctype.h>

// Function to analyze password strength
int analyzePassword(const char *pwd) {
    int len = strlen(pwd);
    int hasUpper = 0;
    int hasLower = 0;
    int hasDigit = 0;
    int hasSpecial = 0;

    // Character diversity check
    for (int i = 0; i < len; i++) {
        if (isupper(pwd[i])) {
            hasUpper = 1;
        }
        else if (islower(pwd[i])) {
            hasLower = 1;
        }
        else if (isdigit(pwd[i])) {
            hasDigit = 1;
        }
        else {
            hasSpecial = 1;
        }
    }

    // Weak pattern detection
    const char *weakPatterns[] = {"123", "password", "qwerty", "abc"};
    int numPatterns = sizeof(weakPatterns) / sizeof(weakPatterns[0]);

    for (int i = 0; i < numPatterns; i++) {
        if (strstr(pwd, weakPatterns[i])) {
            return 0; // Weak
        }
    }

    // Strength classification
    int diversity = hasUpper + hasLower + hasDigit + hasSpecial;

    if (len < 6 || diversity < 2) {
        return 0; // Weak
    }
    else if (len < 10 || diversity < 3) {
        return 1; // Moderate
    }
    else {
        return 2; // Strong
    }
}

int main() {
    char pwd[100];

    printf("Enter password: ");
    scanf("%99s", pwd); // safer input

    int result = analyzePassword(pwd);

    if (result == 0) {
        printf("Weak Password\\n");
    }
    else if (result == 1) {
        printf("Moderate Password\\n");
    }
    else {
        printf("Strong Password\\n");
    }

    return 0;
}`,
            'gui_tui.c': `#include <stdio.h>
#include <string.h>
#include <ctype.h>
#include <ncurses.h>
#include <stdlib.h>

// Function to analyze password strength
int analyzePassword(const char *pwd) {
    int len = strlen(pwd);
    int hasUpper = 0;
    int hasLower = 0;
    int hasDigit = 0;
    int hasSpecial = 0;

    // Character diversity check
    for (int i = 0; i < len; i++) {
        if (isupper(pwd[i])) {
            hasUpper = 1;
        }
        else if (islower(pwd[i])) {
            hasLower = 1;
        }
        else if (isdigit(pwd[i])) {
            hasDigit = 1;
        }
        else {
            hasSpecial = 1;
        }
    }

    // Weak pattern detection
    const char *weakPatterns[] = {"123", "password", "qwerty", "abc"};
    int numPatterns = sizeof(weakPatterns) / sizeof(weakPatterns[0]);

    for (int i = 0; i < numPatterns; i++) {
        if (strstr(pwd, weakPatterns[i])) {
            return 0; // Weak
        }
    }

    // Strength classification
    int diversity = hasUpper + hasLower + hasDigit + hasSpecial;

    if (len < 6 || diversity < 2) {
        return 0; // Weak
    }
    else if (len < 10 || diversity < 3) {
        return 1; // Moderate
    }
    else {
        return 2; // Strong
    }
}

void drawBox(int y, int x, int height, int width) {
    mvaddch(y, x, ACS_ULCORNER);
    mvaddch(y, x + width - 1, ACS_URCORNER);
    mvaddch(y + height - 1, x, ACS_LLCORNER);
    mvaddch(y + height - 1, x + width - 1, ACS_LRCORNER);

    for (int i = 1; i < width - 1; i++) {
        mvaddch(y, x + i, ACS_HLINE);
        mvaddch(y + height - 1, x + i, ACS_HLINE);
    }

    for (int i = 1; i < height - 1; i++) {
        mvaddch(y + i, x, ACS_VLINE);
        mvaddch(y + i, x + width - 1, ACS_VLINE);
    }
}

// ... [TUI Implementation continues] ...
`
        };

        function loadCodeFile(filename) {
            const code = codeFiles[filename] || 'File not found';
            codeBlock.textContent = code;
            hljs.highlightElement(codeBlock);
            copyButton.textContent = 'Copy Code';
            copyButton.classList.remove('copied');
        }

        function copyCodeToClipboard() {
            const code = codeBlock.textContent;
            navigator.clipboard.writeText(code).then(() => {
                copyButton.textContent = '✓ Copied!';
                copyButton.classList.add('copied');
                setTimeout(() => {
                    copyButton.textContent = 'Copy Code';
                    copyButton.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Load initial file
        loadCodeFile('code.c');
        const passwordInput = document.getElementById('password');
        const showPasswordCheckbox = document.getElementById('showPassword');
        const strengthBar = document.getElementById('strengthBar');
        const resultDiv = document.getElementById('result');
        const feedbackDiv = document.getElementById('feedback');
        const criteriaList = document.getElementById('criteriaList');
        const statsDiv = document.getElementById('stats');

        // Weak patterns
        const weakPatterns = ['123', 'password', 'qwerty', 'abc'];

        // Toggle password visibility
        showPasswordCheckbox.addEventListener('change', function() {
            passwordInput.type = this.checked ? 'text' : 'password';
        });

        // Analyze password on input
        passwordInput.addEventListener('input', analyzePassword);

        function analyzePassword() {
            const pwd = passwordInput.value;
            const len = pwd.length;

            // Clear previous results if empty
            if (len === 0) {
                strengthBar.className = 'strength-bar';
                resultDiv.classList.remove('show');
                feedbackDiv.classList.remove('show');
                criteriaList.innerHTML = '';
                statsDiv.innerHTML = '';
                return;
            }

            // Check criteria
            const hasUpper = /[A-Z]/.test(pwd);
            const hasLower = /[a-z]/.test(pwd);
            const hasDigit = /[0-9]/.test(pwd);
            const hasSpecial = /[^A-Za-z0-9]/.test(pwd);
            const hasWeakPattern = weakPatterns.some(pattern => pwd.toLowerCase().includes(pattern));

            // Calculate diversity
            const diversity = [hasUpper, hasLower, hasDigit, hasSpecial].filter(Boolean).length;

            // Determine strength
            let strength = 'strong';
            let strengthLabel = 'Strong Password';

            if (hasWeakPattern || len < 6 || diversity < 2) {
                strength = 'weak';
                strengthLabel = 'Weak Password';
            } else if (len < 10 || diversity < 3) {
                strength = 'moderate';
                strengthLabel = 'Moderate Password';
            }

            // Update strength bar
            strengthBar.className = `strength-bar ${strength}`;

            // Update result
            resultDiv.className = `result show ${strength}`;
            resultDiv.textContent = strengthLabel;

            // Update feedback
            let feedbackText = '';
            if (strength === 'weak') {
                feedbackText = '❌ Too weak - Avoid common patterns and add more character types';
            } else if (strength === 'moderate') {
                feedbackText = '⚠️ Moderate - Make it longer or add more variety';
            } else {
                feedbackText = '✓ Strong - Great password!';
            }
            feedbackDiv.className = 'feedback show';
            feedbackDiv.textContent = feedbackText;

            // Update criteria
            updateCriteria(hasUpper, hasLower, hasDigit, hasSpecial, len);

            // Update stats
            updateStats(len, diversity);
        }

        function updateCriteria(hasUpper, hasLower, hasDigit, hasSpecial, len) {
            const criteria = [
                { label: 'At least 6 characters', met: len >= 6 },
                { label: 'Uppercase letter (A-Z)', met: hasUpper },
                { label: 'Lowercase letter (a-z)', met: hasLower },
                { label: 'Number (0-9)', met: hasDigit },
                { label: 'Special character (!@#$...)', met: hasSpecial }
            ];

            criteriaList.innerHTML = criteria.map(item => `
                <div class="criteria-item">
                    <div class="criteria-icon ${item.met ? 'met' : 'unmet'}">
                        ${item.met ? '✓' : '✗'}
                    </div>
                    <span>${item.label}</span>
                </div>
            `).join('');
        }

        function updateStats(len, diversity) {
            statsDiv.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Length</div>
                    <div class="stat-value">${len}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Diversity</div>
                    <div class="stat-value">${diversity}/4</div>
                </div>
            `;
        }

        function clearPassword() {
            passwordInput.value = '';
            showPasswordCheckbox.checked = false;
            passwordInput.type = 'password';
            analyzePassword();
        }
    </script>
</body>
</html>
